<title>Artsy Places</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#F7F3EC;
  --dark:#1C1710;
  --accent:#C4622D;
  --accent2:#5B8A4A;
  --muted:#9A8E7E;
  --card:#FFFFFF;
  --border:#EAE4D8;
  --shadow:0 4px 24px rgba(0,0,0,0.10);
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--cream);}
body{font-family:'DM Sans',sans-serif;color:var(--dark);display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.topbar{
  background:var(--dark);
  padding:10px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  z-index:500;
  flex-shrink:0;
}
.logo{font-family:'Playfair Display',serif;font-size:18px;color:#fff;white-space:nowrap;letter-spacing:.02em;}
.logo span{color:var(--accent);}
.search-wrap{flex:1;position:relative;}
.search-wrap input{
  width:100%;padding:9px 12px 9px 34px;
  border-radius:10px;border:none;
  background:rgba(255,255,255,0.12);
  color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;
}
.search-wrap input::placeholder{color:rgba(255,255,255,0.38);}
.search-wrap input:focus{background:rgba(255,255,255,0.18);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;opacity:.5;}
.loc-btn{
  width:38px;height:38px;border-radius:10px;border:none;
  background:rgba(255,255,255,0.12);color:#fff;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .2s;
}
.loc-btn:active{background:var(--accent);}

/* ── FILTER PILLS ── */
.filters{
  display:flex;gap:6px;padding:8px 14px;
  overflow-x:auto;flex-shrink:0;
  background:var(--dark);border-bottom:1px solid rgba(255,255,255,.06);
  scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none;}
.fpill{
  padding:5px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.2);
  background:transparent;color:rgba(255,255,255,.55);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;
}
.fpill.active,.fpill:active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── MAP ── */
#map{flex:1;z-index:1;min-height:0;}

/* ── BOTTOM SHEET ── */
.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  border-radius:20px 20px 0 0;
  box-shadow:0 -4px 30px rgba(0,0,0,0.15);
  z-index:400;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  max-height:82vh;
  display:flex;flex-direction:column;
}
.sheet.collapsed{transform:translateY(calc(100% - 70px));}
.sheet.half{transform:translateY(40%);}
.sheet.full{transform:translateY(0);}

.sheet-handle-row{
  padding:10px 0 6px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;flex-shrink:0;
}
.handle{width:40px;height:4px;background:var(--border);border-radius:4px;}
.sheet-title-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px 10px;flex-shrink:0;
}
.sheet-title{font-family:'Playfair Display',serif;font-size:16px;}
.count-pill{background:var(--accent);color:#fff;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;}

/* gallery list */
.glist{flex:1;overflow-y:auto;padding:0 12px 12px;min-height:0;}
.glist::-webkit-scrollbar{width:0;}

.gcard{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:13px 14px;margin-bottom:8px;cursor:pointer;
  transition:border-color .2s, box-shadow .2s;
  display:flex;align-items:center;gap:12px;
}
.gcard:active,.gcard.active{border-color:var(--accent);box-shadow:0 2px 12px rgba(196,98,45,.15);}
.gcard-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.1);
}
.gcard-body{flex:1;min-width:0;}
.gcard-name{font-size:14px;font-weight:500;line-height:1.3;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gcard-city{font-size:12px;color:var(--muted);}
.gcard-badge{
  font-size:10px;font-weight:500;padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;
}
.bi{background:#FFF0E8;color:#C4622D;}
.be{background:#E8F0FF;color:#2050C0;}
.ba{background:#EDFEE8;color:#306020;}
.bap{background:#FFF8E0;color:#906010;}
.bm{background:#F5E8FF;color:#6030A0;}
.baf{background:#E8FFF5;color:#20705A;}

/* ── DETAIL SHEET ── */
.detail{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-radius:20px 20px 0 0;
  box-shadow:0 -4px 30px rgba(0,0,0,0.18);
  z-index:600;padding:0 0 env(safe-area-inset-bottom,0);
  max-height:75vh;overflow-y:auto;
}
.detail.open{display:block;}
.detail-handle{padding:10px 0 4px;display:flex;justify-content:center;}
.detail-handle .handle{width:40px;height:4px;background:var(--border);border-radius:4px;}
.detail-inner{padding:4px 18px 24px;}
.detail-region{
  font-size:11px;font-weight:500;padding:3px 10px;border-radius:10px;
  display:inline-block;margin-bottom:10px;
}
.detail-name{font-family:'Playfair Display',serif;font-size:22px;line-height:1.25;margin-bottom:4px;}
.detail-city{font-size:14px;color:var(--muted);margin-bottom:14px;}
.detail-info{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.detail-row{display:flex;align-items:flex-start;gap:10px;font-size:14px;}
.detail-row .ico{font-size:16px;flex-shrink:0;margin-top:1px;}
.detail-row .txt{color:var(--dark);line-height:1.4;}

/* direction mode strip */
.mode-strip{display:flex;gap:6px;margin-bottom:14px;}
.mmode{
  flex:1;padding:9px 4px;border-radius:10px;
  border:1px solid var(--border);background:#fff;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;text-align:center;transition:all .2s;color:var(--muted);
}
.mmode.active{background:var(--dark);border-color:var(--dark);color:#fff;}

.dir-input{
  width:100%;padding:11px 14px;border-radius:12px;
  border:1px solid var(--border);background:var(--cream);
  font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;margin-bottom:10px;color:var(--dark);
}
.dir-input:focus{border-color:var(--accent);}

.btn-dir{
  width:100%;padding:13px;border-radius:12px;border:none;
  background:var(--accent);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;transition:background .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-dir:active{background:#A84F22;}
.btn-close-d{
  float:right;background:var(--cream);border:none;
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;color:var(--muted);margin-bottom:12px;
}

/* overlay for closing detail */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.25);}
.overlay.open{display:block;}

/* ── LOCATE FAB ── */
.fab-loc{
  position:fixed;right:14px;z-index:300;
  width:44px;height:44px;border-radius:50%;
  background:#fff;box-shadow:var(--shadow);
  border:none;cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.fab-loc:active{background:var(--cream);}

/* loading screen */
.loading{
  position:fixed;inset:0;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s;
}
.loading.done{opacity:0;pointer-events:none;}
.loading-logo{font-family:'Playfair Display',serif;font-size:32px;color:#fff;margin-bottom:8px;}
.loading-logo span{color:var(--accent);}
.loading-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:32px;}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.no-results{text-align:center;padding:40px 20px;color:var(--muted);}
.no-results .big{font-size:40px;margin-bottom:10px;}

.user-pulse{
  width:16px;height:16px;background:#3B82F6;border:3px solid #fff;
  border-radius:50%;box-shadow:0 0 0 6px rgba(59,130,246,.2);
}
</style>
</head>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="loading-logo">Artsy <span>Places</span></div>
  <div class="loading-sub">Finding galleries near you…</div>
  <div class="spinner"></div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">Artsy <span>Places</span></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>

  </div>
  <button class="loc-btn" onclick="goToMyLocation()" title="My location">📍</button>
</div>

<!-- Filters -->
<div class="filters">
  <button class="fpill active" onclick="setFilter('all',this)">All</button>
  <button class="fpill" onclick="setFilter('India',this)">🇮🇳 India</button>
  <button class="fpill" onclick="setFilter('Europe',this)">🇪🇺 Europe</button>

  <button class="fpill" onclick="setFilter('Middle East',this)">🌙 Middle East</button>
  <button class="fpill" onclick="setFilter('Africa',this)">🌍 Africa</button>
</div>

<!-- Map -->
<div id="map"></div>

<!-- FAB locate -->
<button class="fab-loc" id="fabLoc" style="bottom:220px;" onclick="goToMyLocation()">📍</button>

<!-- Bottom sheet: gallery list -->
<div class="sheet half" id="sheet">
  <div class="sheet-handle-row" onclick="toggleSheet()">
    <div class="handle"></div>
  </div>
  <div class="sheet-title-row">
    <div class="sheet-title">Art Galleries</div>
    <span class="count-pill" id="countBadge">0</span>
  </div>
  <div class="glist" id="galleryList"></div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeDetail()"></div>

<!-- Detail / Direction sheet -->
<div class="detail" id="detailSheet">
  <div class="detail-handle"><div class="handle"></div></div>
  <div class="detail-inner">
    <button class="btn-close-d" onclick="closeDetail()">✕</button>
    <div class="detail-region" id="dRegion"></div>
    <div class="detail-name" id="dName"></div>
    <div class="detail-city" id="dCity"></div>
    <div class="detail-info">
      <div class="detail-row"><span class="ico">📍</span><span class="txt" id="dAddress"></span></div>
    </div>
    <div class="mode-strip">
      <button class="mmode active" onclick="setMode('driving',this)">🚗 Drive</button>
      <button class="mmode" onclick="setMode('walking',this)">🚶 Walk</button>
      <button class="mmode" onclick="setMode('cycling',this)">🚴 Cycle</button>
    </div>
    <input class="dir-input" id="fromInput" placeholder="Your location (tap 📍 to use GPS)">
    <button class="btn-dir" onclick="getDirections()">🧭 Get directions</button>
  </div>
</div>

];

const regionColors={India:"#C4622D",Europe:"#2050C0",Americas:"#3A7A20","Asia Pacific":"#A06010","Middle East":"#7040B0",Africa:"#207050"};
const badgeClass={India:"bi",Europe:"be",Americas:"ba","Asia Pacific":"bap","Middle East":"bm",Africa:"baf"};

let map,markers=[],userMarker=null,routeLine=null,travelMode="driving",activeFilter="all",activeIdx=null,sheetState="half";

function initMap(){
  map=L.map("map",{zoomControl:false,attributionControl:true}).setView([28.61,77.21],12);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
    attribution:'© OpenStreetMap © Carto',maxZoom:19
  }).addTo(map);

  galleries.forEach((g,i)=>{
    const icon=makeIcon(g.region,false);
    const m=L.marker([g.lat,g.lng],{icon}).addTo(map);
    m.on("click",()=>openDetail(i));
    markers.push(m);
  });

  renderList(galleries);
  getUserLocation(true);
}

function makeIcon(region,big){
  const c=regionColors[region]||"#888";
  const s=big?16:11;
  return L.divIcon({
    className:"",
    html:`<div style="width:${s}px;height:${s}px;background:${c};border:${big?3:2}px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,.3)"></div>`,
    iconSize:[s,s],iconAnchor:[s/2,s/2]
  });
}

function getUserLocation(onLoad){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    placeUserMarker(lat,lng);
    if(onLoad){
      map.flyTo([lat,lng],13,{duration:1.5});
      document.getElementById("fromInput").value=`${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    }
    document.getElementById("loading").classList.add("done");
  },()=>{
    // denied — just hide loading, keep Delhi view
    document.getElementById("loading").classList.add("done");
  },{timeout:8000});
}

function goToMyLocation(){
  if(!navigator.geolocation){alert("Location not available");return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    placeUserMarker(lat,lng);
    map.flyTo([lat,lng],14,{duration:1});
    document.getElementById("fromInput").value=`${lat.toFixed(6)}, ${lng.toFixed(6)}`;
  },()=>alert("Could not get your location. Please enable location access."));
}

function placeUserMarker(lat,lng){
  if(userMarker)map.removeLayer(userMarker);
  userMarker=L.marker([lat,lng],{
    icon:L.divIcon({className:"",html:'<div class="user-pulse"></div>',iconSize:[16,16],iconAnchor:[8,8]})
  }).addTo(map);
}

// ── SHEET TOGGLE ──
function toggleSheet(){
  const s=document.getElementById("sheet");
  if(sheetState==="half"){sheetState="full";s.className="sheet full";}
  else if(sheetState==="full"){sheetState="collapsed";s.className="sheet collapsed";}
  else{sheetState="half";s.className="sheet half";}
  updateFab();
}

function updateFab(){
  const fab=document.getElementById("fabLoc");
  fab.style.bottom=sheetState==="full"?"calc(80vh + 14px)":sheetState==="half"?"220px":"80px";
}

// ── RENDER LIST ──
function renderList(list){
  document.getElementById("countBadge").textContent=list.length;
  const el=document.getElementById("galleryList");
  if(!list.length){
    el.innerHTML=`<div class="no-results"><div class="big">🎨</div>No galleries found</div>`;return;
  }
  el.innerHTML=list.map(g=>{
    const i=galleries.indexOf(g);
    return`<div class="gcard" id="card-${i}" onclick="openDetail(${i})">
      <div class="gcard-dot" style="background:${regionColors[g.region]||'#888'}"></div>
      <div class="gcard-body">
        <div class="gcard-name">${g.name}</div>
        <div class="gcard-city">${g.city}, ${g.country}</div>
      </div>
      <span class="gcard-badge ${badgeClass[g.region]||''}">${g.region}</span>
    </div>`;
  }).join("");
}

// ── DETAIL ──
function openDetail(i){
  const g=galleries[i];
  activeIdx=i;

  document.querySelectorAll(".gcard").forEach(c=>c.classList.remove("active"));
  const card=document.getElementById(`card-${i}`);
  if(card){card.classList.add("active");card.scrollIntoView({behavior:"smooth",block:"nearest"});}

  const rc=regionColors[g.region]||"#888";
  const bc=badgeClass[g.region]||"";
  document.getElementById("dRegion").textContent=g.region;
  document.getElementById("dRegion").className=`detail-region gcard-badge ${bc}`;
  document.getElementById("dName").textContent=g.name;
  document.getElementById("dCity").textContent=`${g.city}, ${g.country}`;
  document.getElementById("dAddress").textContent=g.address;

  // big marker
  markers.forEach((m,idx)=>m.setIcon(makeIcon(galleries[idx].region,false)));
  markers[i].setIcon(makeIcon(g.region,true));

  map.flyTo([g.lat,g.lng],14,{duration:1});

  document.getElementById("detailSheet").classList.add("open");
  document.getElementById("overlay").classList.add("open");

  // collapse list sheet
  document.getElementById("sheet").className="sheet collapsed";
  sheetState="collapsed";updateFab();
}

function closeDetail(){
  document.getElementById("detailSheet").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  if(activeIdx!==null)markers[activeIdx].setIcon(makeIcon(galleries[activeIdx].region,false));
  activeIdx=null;
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  document.getElementById("sheet").className="sheet half";
  sheetState="half";updateFab();
}

// ── DIRECTIONS ──
function setMode(mode,btn){
  travelMode=mode;
  document.querySelectorAll(".mmode").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function getDirections(){
  if(activeIdx===null)return;
  const g=galleries[activeIdx];
  const from=document.getElementById("fromInput").value.trim();
  if(!from){
    // try get location first
    getUserLocation(false);
    setTimeout(()=>{
      const v=document.getElementById("fromInput").value.trim();
      if(v)launchDirections(g,v);else alert("Please enable location or enter your address.");
    },2000);
    return;
  }
  launchDirections(g,from);
}

function launchDirections(g,from){
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  const modeMap={driving:"driving",walking:"walking",cycling:"bicycling"};
  const googleMode=modeMap[travelMode]||"driving";
  let originParam;
  if(from.match(/^-?\d+\.?\d*,\s*-?\d+\.?\d*$/)){
    const[la,lo]=from.split(",").map(s=>s.trim());
    originParam=`${la},${lo}`;
    routeLine=L.polyline([[parseFloat(la),parseFloat(lo)],[g.lat,g.lng]],
      {color:"#C4622D",weight:3,dashArray:"8,5",opacity:.85}).addTo(map);
    map.fitBounds(routeLine.getBounds(),{padding:[80,80]});
  }else{
    originParam=encodeURIComponent(from);
  }
  const dest=`${g.lat},${g.lng}`;
  window.open(`https://www.google.com/maps/dir/?api=1&origin=${originParam}&destination=${encodeURIComponent(dest)}&travelmode=${googleMode}`,"_blank");
}

// ── FILTER & SEARCH ──
function setFilter(region,btn){
  activeFilter=region;
  document.querySelectorAll(".fpill").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  filterGalleries();
}

function filterGalleries(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const filtered=galleries.filter(g=>{
    const mr=activeFilter==="all"||g.region===activeFilter;
    const ms=!q||g.name.toLowerCase().includes(q)||g.city.toLowerCase().includes(q)||g.country.toLowerCase().includes(q);
    return mr&&ms;
  });
  markers.forEach((m,i)=>{
    const g=galleries[i];
    const mr=activeFilter==="all"||g.region===activeFilter;
    const ms=!q||g.name.toLowerCase().includes(q)||g.city.toLowerCase().includes(q)||g.country.toLowerCase().includes(q);
    if(mr&&ms){if(!map.hasLayer(m))m.addTo(map);}
    else{if(map.hasLayer(m))map.removeLayer(m);}
  });
  renderList(filtered);
}

initMap();
</script>
</body>
</html>
