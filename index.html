<title>Artsy Places — Delhi Art Galleries</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--cream:#F7F3EC;--dark:#1C1710;--accent:#C4622D;--muted:#9A8E7E;--card:#fff;--border:#EAE4D8;}
html,body{height:100%;width:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;color:var(--dark);display:flex;flex-direction:column;background:var(--cream);}
.topbar{background:var(--dark);padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:500;flex-shrink:0;}
.logo{font-family:'Playfair Display',serif;font-size:18px;color:#fff;white-space:nowrap;}
.logo span{color:var(--accent);}
.search-wrap{flex:1;position:relative;}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;border-radius:10px;border:none;background:rgba(255,255,255,0.12);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.search-wrap input::placeholder{color:rgba(255,255,255,0.38);}
.search-wrap input:focus{background:rgba(255,255,255,0.18);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;opacity:.5;}
.loc-btn{width:38px;height:38px;border-radius:10px;border:none;background:rgba(255,255,255,0.12);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.loc-btn:active,.loc-btn.active{background:var(--accent);}
.filters{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;flex-shrink:0;background:var(--dark);scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fpill{padding:5px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.55);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.fpill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
#map{flex:1;z-index:1;min-height:0;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.15);z-index:400;transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:82vh;display:flex;flex-direction:column;}
.sheet.collapsed{transform:translateY(calc(100% - 70px));}
.sheet.half{transform:translateY(40%);}
.sheet.full{transform:translateY(0);}
.sheet-handle-row{padding:10px 0 6px;display:flex;flex-direction:column;align-items:center;cursor:pointer;flex-shrink:0;}
.handle{width:40px;height:4px;background:var(--border);border-radius:4px;}
.sheet-title-row{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px;flex-shrink:0;}
.sheet-title{font-family:'Playfair Display',serif;font-size:16px;}
.count-pill{background:var(--accent);color:#fff;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;}
.nearby-note{font-size:11px;color:var(--muted);padding:0 16px 8px;flex-shrink:0;}
.glist{flex:1;overflow-y:auto;padding:0 12px 12px;min-height:0;scrollbar-width:none;}
.glist::-webkit-scrollbar{display:none;}
.gcard{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;display:flex;align-items:center;gap:12px;}
.gcard:active,.gcard.active{border-color:var(--accent);}
.gcard-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid #fff;box-shadow:0 0 0 1.5px rgba(0,0,0,.15);}
.gcard-body{flex:1;min-width:0;}
.gcard-name{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gcard-meta{font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;}
.dist-badge{font-size:10px;background:#E8F4FF;color:#1860A0;padding:1px 6px;border-radius:8px;font-weight:500;}
.detail{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.18);z-index:600;max-height:80vh;overflow-y:auto;}
.detail.open{display:block;}
.detail-handle{padding:10px 0 4px;display:flex;justify-content:center;}
.detail-inner{padding:4px 18px 28px;}
.dbadge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:8px;}
.detail-name{font-family:'Playfair Display',serif;font-size:20px;line-height:1.25;margin-bottom:2px;}
.detail-sub{font-size:13px;color:var(--muted);margin-bottom:4px;}
.detail-rating{font-size:13px;color:#B07010;margin-bottom:12px;}
.detail-row{display:flex;align-items:flex-start;gap:10px;font-size:13px;margin-bottom:6px;}
.detail-row .ico{font-size:15px;flex-shrink:0;margin-top:1px;}
.hours-toggle{font-size:12px;color:var(--accent);cursor:pointer;margin:4px 0 6px;display:block;}
.hours-list{font-size:12px;color:var(--muted);line-height:1.9;display:none;margin-bottom:8px;}
.hours-list.open{display:block;}
.mode-strip{display:flex;gap:6px;margin:12px 0 10px;}
.mmode{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--border);background:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-align:center;color:var(--muted);transition:all .2s;}
.mmode.active{background:var(--dark);border-color:var(--dark);color:#fff;}
.dir-input{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:var(--cream);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:10px;color:var(--dark);}
.dir-input:focus{border-color:var(--accent);}
.btn-dir{width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-close-d{float:right;background:var(--cream);border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--muted);margin-bottom:10px;}
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.25);}
.overlay.open{display:block;}
.fab-loc{position:fixed;right:14px;z-index:300;width:46px;height:46px;border-radius:50%;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,0.13);border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.fab-loc:active{background:#fff3ee;}
.loading{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s;}
.loading.done{opacity:0;pointer-events:none;}
.loading-logo{font-family:'Playfair Display',serif;font-size:32px;color:#fff;margin-bottom:6px;}
.loading-logo span{color:var(--accent);}
.loading-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:30px;}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.no-results{text-align:center;padding:40px 20px;color:var(--muted);}
.no-results .big{font-size:36px;margin-bottom:8px;}
.user-pulse{width:16px;height:16px;background:#3B82F6;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(59,130,246,.2);}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-logo">Artsy <span>Places</span></div>
  <div class="loading-sub">Finding galleries near you…</div>
  <div class="spinner"></div>
</div>

<div class="topbar">
  <div class="logo">Artsy <span>Places</span></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search galleries, areas…" oninput="filterGalleries()">
  </div>
  <button class="loc-btn" id="locBtn" onclick="goToMyLocation()">📍</button>
</div>
<div class="filters">
  <button class="fpill active" onclick="setFilter('all',this)">All</button>
  <button class="fpill" onclick="setFilter('Delhi',this)">🎨 Delhi</button>
  <button class="fpill" onclick="setFilter('Europe',this)">🇪🇺 Europe</button>
  <button class="fpill" onclick="setFilter('Americas',this)">🌎 Americas</button>
  <button class="fpill" onclick="setFilter('Asia Pacific',this)">🌏 Asia Pacific</button>
  <button class="fpill" onclick="setFilter('Middle East',this)">🌙 Middle East</button>
  <button class="fpill" onclick="setFilter('Africa',this)">🌍 Africa</button>
</div>

<div id="map"></div>
<button class="fab-loc" id="fabLoc" style="bottom:220px;" onclick="goToMyLocation()">📍</button>

<div class="sheet half" id="sheet">
  <div class="sheet-handle-row" onclick="toggleSheet()"><div class="handle"></div></div>
  <div class="sheet-title-row">
    <div class="sheet-title">Art Galleries</div>
    <span class="count-pill" id="countBadge">0</span>
  </div>
  <div class="nearby-note" id="nearbyNote"></div>
  <div class="glist" id="galleryList"></div>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail" id="detailSheet">
  <div class="detail-handle"><div class="handle"></div></div>
  <div class="detail-inner">
    <button class="btn-close-d" onclick="closeDetail()">✕</button>
    <div class="dbadge" id="dRegion"></div>
    <div class="detail-name" id="dName"></div>
    <div class="detail-sub" id="dSub"></div>
    <div class="detail-rating" id="dRating"></div>
    <div class="detail-row"><span class="ico">📍</span><span id="dAddress"></span></div>
    <span class="hours-toggle" onclick="toggleHours()">🕐 Show opening hours</span>
    <div class="hours-list" id="dHours"></div>
    <div class="mode-strip">
      <button class="mmode active" onclick="setMode('driving',this)">🚗 Drive</button>
      <button class="mmode" onclick="setMode('walking',this)">🚶 Walk</button>
      <button class="mmode" onclick="setMode('cycling',this)">🚴 Cycle</button>
    </div>
    <input class="dir-input" id="fromInput" placeholder="Your location (tap 📍 for GPS)">
    <button class="btn-dir" onclick="getDirections()">🧭 Get directions</button>
  </div>
</div>

const regionColors={Delhi:"#C4622D",Europe:"#2050C0",Americas:"#3A7A20","Asia Pacific":"#A06010","Middle East":"#7040B0",Africa:"#207050"};
const badgeClass={Delhi:"bi",Europe:"be",Americas:"ba","Asia Pacific":"bap","Middle East":"bm",Africa:"baf"};
const badgeStyle={Delhi:"background:#FFF0E8;color:#C4622D",Europe:"background:#E8F0FF;color:#2050C0",Americas:"background:#EDFEE8;color:#306020","Asia Pacific":"background:#FFF8E0;color:#906010","Middle East":"background:#F5E8FF;color:#6030A0",Africa:"background:#E8FFF5;color:#20705A"};

let map,markers=[],userMarker=null,routeLine=null,travelMode="driving",activeFilter="all",activeIdx=null,sheetState="half";
let userLat=null,userLng=null;

function distKm(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fmtDist(km){
  return km<1?(Math.round(km*1000)+"m"):(km.toFixed(1)+"km");
}

function initMap(){
  map=L.map("map",{zoomControl:false}).setView([28.57,77.21],12);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{attribution:'© OpenStreetMap © Carto',maxZoom:19}).addTo(map);
  galleries.forEach((g,i)=>{
    const m=L.marker([g.lat,g.lng],{icon:makeIcon(g.region,false)}).addTo(map);
    m.on("click",()=>openDetail(i));
    markers.push(m);
  });
  renderList(galleries);
  getUserLocation(true);
}

function makeIcon(region,big){
  const c=regionColors[region]||"#888",s=big?16:11;
  return L.divIcon({className:"",html:`<div style="width:${s}px;height:${s}px;background:${c};border:${big?3:2}px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,.3)"></div>`,iconSize:[s,s],iconAnchor:[s/2,s/2]});
}

function getUserLocation(onLoad){
  if(!navigator.geolocation)return void document.getElementById("loading").classList.add("done");
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude; userLng=pos.coords.longitude;
    placeUserMarker(userLat,userLng);
    if(onLoad){
      map.flyTo([userLat,userLng],14,{duration:1.5});
      filterGalleries(); // re-sort by distance
    }
    document.getElementById("fromInput").value=`${userLat.toFixed(6)}, ${userLng.toFixed(6)}`;
    document.getElementById("loading").classList.add("done");
  },()=>{
    document.getElementById("loading").classList.add("done");
  },{timeout:8000,enableHighAccuracy:true});
}

function goToMyLocation(){
  document.getElementById("locBtn").classList.add("active");
  setTimeout(()=>document.getElementById("locBtn").classList.remove("active"),1500);
  if(!navigator.geolocation)return alert("Location not available");
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude; userLng=pos.coords.longitude;
    placeUserMarker(userLat,userLng);
    map.flyTo([userLat,userLng],14,{duration:1});
    document.getElementById("fromInput").value=`${userLat.toFixed(6)}, ${userLng.toFixed(6)}`;
    filterGalleries();
  },()=>alert("Could not get location. Please enable location access."),{enableHighAccuracy:true});
}

function placeUserMarker(lat,lng){
  if(userMarker)map.removeLayer(userMarker);
  userMarker=L.marker([lat,lng],{icon:L.divIcon({className:"",html:'<div class="user-pulse"></div>',iconSize:[16,16],iconAnchor:[8,8]})}).addTo(map);
}

function toggleSheet(){
  const s=document.getElementById("sheet");
  sheetState=sheetState==="half"?"full":sheetState==="full"?"collapsed":"half";
  s.className="sheet "+sheetState;
  document.getElementById("fabLoc").style.bottom=sheetState==="full"?"calc(80vh + 14px)":sheetState==="half"?"220px":"80px";
}

function renderList(list){
  document.getElementById("countBadge").textContent=list.length;
  const noteEl=document.getElementById("nearbyNote");
  const el=document.getElementById("galleryList");
  if(!list.length){noteEl.textContent="";el.innerHTML=`<div class="no-results"><div class="big">🎨</div>No galleries found</div>`;return;}

  // Sort by distance if we have location
  if(userLat!==null){
    list=list.slice().sort((a,b)=>distKm(userLat,userLng,a.lat,a.lng)-distKm(userLat,userLng,b.lat,b.lng));
    noteEl.textContent="Sorted by distance from your location";
  } else {
    noteEl.textContent="Enable location to see nearest galleries first";
  }

  el.innerHTML=list.map(g=>{
    const i=galleries.indexOf(g);
    const dist=userLat!==null?fmtDist(distKm(userLat,userLng,g.lat,g.lng)):null;
    return`<div class="gcard" id="card-${i}" onclick="openDetail(${i})">
      <div class="gcard-dot" style="background:${regionColors[g.region]||'#888'}"></div>
      <div class="gcard-body">
        <div class="gcard-name">${g.name}</div>
        <div class="gcard-meta">
          <span>${g.area}</span>
          <span>⭐ ${g.rating}</span>
          ${dist?`<span class="dist-badge">📍 ${dist}</span>`:""}
        </div>
      </div>
    </div>`;
  }).join("");
}

function openDetail(i){
  const g=galleries[i];activeIdx=i;
  document.querySelectorAll(".gcard").forEach(c=>c.classList.remove("active"));
  const card=document.getElementById(`card-${i}`);
  if(card){card.classList.add("active");card.scrollIntoView({behavior:"smooth",block:"nearest"});}
  document.getElementById("dRegion").textContent=g.region;
  document.getElementById("dRegion").style=badgeStyle[g.region]||"";
  document.getElementById("dName").textContent=g.name;
  const dist=userLat!==null?" · "+fmtDist(distKm(userLat,userLng,g.lat,g.lng))+" away":"";
  document.getElementById("dSub").textContent=`${g.area} · ${g.city}${dist}`;
  document.getElementById("dRating").textContent=`⭐ ${g.rating} rating`;
  document.getElementById("dAddress").textContent=g.address;
  const hoursEl=document.getElementById("dHours");
  hoursEl.innerHTML=g.hours&&g.hours.length?g.hours.join("<br>"):"Hours not available";
  hoursEl.classList.remove("open");
  document.querySelector(".hours-toggle").textContent="🕐 Show opening hours";
  markers.forEach((m,idx)=>m.setIcon(makeIcon(galleries[idx].region,false)));
  markers[i].setIcon(makeIcon(g.region,true));
  map.flyTo([g.lat,g.lng],16,{duration:1});
  document.getElementById("detailSheet").classList.add("open");
  document.getElementById("overlay").classList.add("open");
  document.getElementById("sheet").className="sheet collapsed";
  sheetState="collapsed";
  document.getElementById("fabLoc").style.bottom="80px";
}

function toggleHours(){
  const h=document.getElementById("dHours");
  const t=document.querySelector(".hours-toggle");
  h.classList.toggle("open");
  t.textContent=h.classList.contains("open")?"🕐 Hide hours":"🕐 Show opening hours";
}

function closeDetail(){
  document.getElementById("detailSheet").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  if(activeIdx!==null)markers[activeIdx].setIcon(makeIcon(galleries[activeIdx].region,false));
  activeIdx=null;
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  document.getElementById("sheet").className="sheet half";
  sheetState="half";
  document.getElementById("fabLoc").style.bottom="220px";
}

function setMode(mode,btn){
  travelMode=mode;
  document.querySelectorAll(".mmode").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function getDirections(){
  if(activeIdx===null)return;
  const g=galleries[activeIdx];
  const from=document.getElementById("fromInput").value.trim();
  if(!from){getUserLocation(false);setTimeout(()=>{const v=document.getElementById("fromInput").value.trim();if(v)launch(g,v);else alert("Please enable location or enter your address.");},2000);return;}
  launch(g,from);
}

function launch(g,from){
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  const modeMap={driving:"driving",walking:"walking",cycling:"bicycling"};
  let originParam;
  if(from.match(/^-?\d+\.?\d*,\s*-?\d+\.?\d*$/)){
    const[la,lo]=from.split(",").map(s=>s.trim());
    originParam=`${la},${lo}`;
    routeLine=L.polyline([[parseFloat(la),parseFloat(lo)],[g.lat,g.lng]],{color:"#C4622D",weight:3,dashArray:"8,5",opacity:.85}).addTo(map);
    map.fitBounds(routeLine.getBounds(),{padding:[80,80]});
  }else{originParam=encodeURIComponent(from);}
  window.open(`https://www.google.com/maps/dir/?api=1&origin=${originParam}&destination=${encodeURIComponent(g.lat+","+g.lng)}&travelmode=${modeMap[travelMode]||"driving"}`,"_blank");
}

function setFilter(region,btn){
  activeFilter=region;
  document.querySelectorAll(".fpill").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  filterGalleries();
}

function filterGalleries(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  let filtered=galleries.filter(g=>{
    const mr=activeFilter==="all"||g.region===activeFilter;
    const ms=!q||g.name.toLowerCase().includes(q)||g.city.toLowerCase().includes(q)||g.area.toLowerCase().includes(q);
    return mr&&ms;
  });
  markers.forEach((m,i)=>{
    const g=galleries[i];
    const mr=activeFilter==="all"||g.region===activeFilter;
    const ms=!q||g.name.toLowerCase().includes(q)||g.city.toLowerCase().includes(q)||g.area.toLowerCase().includes(q);
    mr&&ms?(!map.hasLayer(m)&&m.addTo(map)):(map.hasLayer(m)&&map.removeLayer(m));
  });
  renderList(filtered);
}

initMap();
</script>
